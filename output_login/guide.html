<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login Training</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #2c3e50;
        }
        h2 {
            color: #34495e;
        }
        .step {
            margin-bottom: 40px;
            padding: 20px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        img {
            width: 100%;
            max-width: 1000px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>Login Training Guide</h1>
<hr>

<div class="step">
    <h2>Step 1: Open http://localhost:8080/Plone and click 'Log in'</h2>
    <img src="01-home.png" alt="Step 1">
</div>

<div class="step">
    <h2>Step 2: Enter login name and password, then press 'Log in'</h2>
    <img src="02-login.png" alt="Step 2">
</div>

<div class="step">
    <h2>Step 3: Login successful: your name appears at the bottom of the left toolbar</h2>
    <img src="03-success.png" alt="Step 3">
</div>

</body>
</html>
